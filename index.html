<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>药学院本学期的会议记录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: oklch(0.97 0.008 120);
  --surface: oklch(0.99 0.004 120);
  --surface-alt: oklch(0.95 0.012 120);
  --text-primary: oklch(0.25 0.02 140);
  --text-secondary: oklch(0.45 0.015 135);
  --text-muted: oklch(0.6 0.01 130);
  --accent: oklch(0.48 0.14 155);
  --accent-light: oklch(0.75 0.08 150);
  --accent-dim: oklch(0.6 0.1 155);
  --gold: oklch(0.72 0.12 85);
  --gold-light: oklch(0.88 0.08 88);
  --divider: oklch(0.85 0.015 125);
  --shadow-sm: 0 1px 3px oklch(0 0 0 / 0.06), 0 1px 2px oklch(0 0 0 / 0.04);
  --shadow-md: 0 4px 16px oklch(0 0 0 / 0.07), 0 2px 6px oklch(0 0 0 / 0.04);
  --shadow-lg: 0 8px 32px oklch(0 0 0 / 0.09), 0 3px 10px oklch(0 0 0 / 0.05);
  --radius: 0.75rem;
  --radius-sm: 0.5rem;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html {
  font-size: 16px;
  scroll-behavior: smooth;
  -webkit-font-smoothing: antialiased;
}

body {
  font-family: 'Noto Sans SC', system-ui, -apple-system, sans-serif;
  background-color: var(--bg);
  color: var(--text-primary);
  line-height: 1.7;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -20%, oklch(0.88 0.06 140 / 0.15), transparent),
    radial-gradient(ellipse 60% 40% at 90% 80%, oklch(0.85 0.08 120 / 0.1), transparent);
}

/* ── Header ── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: oklch(0.99 0.003 120 / 0.85);
  backdrop-filter: blur(20px) saturate(1.5);
  border-bottom: 1px solid oklch(0.88 0.015 125 / 0.6);
  padding: clamp(1rem, 3vw, 1.5rem) clamp(1rem, 5vw, 2rem);
}

.header-inner {
  max-width: 800px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
}

.header-title {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(1.1rem, 3vw, 1.4rem);
  font-weight: 700;
  color: var(--text-primary);
  letter-spacing: 0.02em;
}

.header-badge {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--accent);
  background: oklch(0.85 0.06 150 / 0.25);
  padding: 0.3em 0.75em;
  border-radius: 999px;
  white-space: nowrap;
  letter-spacing: 0.03em;
}

/* ── Hero ── */
.hero {
  max-width: 800px;
  margin: 0 auto;
  padding: clamp(2rem, 6vw, 3.5rem) clamp(1rem, 5vw, 2rem) clamp(1.5rem, 4vw, 2.5rem);
}

.hero-eyebrow {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.6rem;
}

.hero h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(1.8rem, 6vw, 2.8rem);
  font-weight: 900;
  line-height: 1.25;
  color: var(--text-primary);
  margin-bottom: 0.6rem;
}

.hero-sub {
  font-size: clamp(0.9rem, 2.5vw, 1.05rem);
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex-wrap: wrap;
}

.hero-sub .sep {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent-light);
}

/* ── Timeline Container ── */
.timeline {
  max-width: 800px;
  margin: 0 auto;
  padding: 0 clamp(1rem, 5vw, 2rem) clamp(3rem, 10vw, 6rem);
  position: relative;
}

.timeline::before {
  content: '';
  position: absolute;
  left: clamp(1rem, 5vw, 2rem);
  top: 0;
  bottom: 0;
  width: 2px;
  background: linear-gradient(
    to bottom,
    var(--accent-light),
    oklch(0.85 0.02 130) 80%,
    transparent
  );
}

/* ── Month Label ── */
.month-label {
  position: relative;
  margin: 2rem 0 1.2rem clamp(1.5rem, 5.5vw, 2.5rem);
  font-family: 'Noto Serif SC', serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--accent-dim);
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: 0.75rem;
}

.month-label::before {
  content: '';
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 4px oklch(0.75 0.1 150 / 0.25);
  position: absolute;
  left: calc(-1 * (clamp(1.5rem, 5.5vw, 2.5rem) - 1rem + 13px));
  top: 50%;
  transform: translateY(-50%);
}

.month-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: oklch(0.85 0.015 125 / 0.5);
  max-width: 3rem;
}

/* ── Meeting Card ── */
.meeting-card {
  position: relative;
  margin-left: clamp(1.5rem, 5.5vw, 2.5rem);
  margin-bottom: 1.25rem;
  background: var(--surface);
  border-radius: var(--radius);
  box-shadow: var(--shadow-sm);
  border: 1px solid oklch(0.9 0.01 125 / 0.5);
  overflow: hidden;
  transition: box-shadow 0.25s ease-out, transform 0.25s ease-out;
}

.meeting-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.meeting-card:active {
  transform: translateY(0);
}

/* Card dot */
.meeting-card::before {
  content: '';
  position: absolute;
  left: calc(-1 * (clamp(1.5rem, 5.5vw, 2.5rem) - 1rem + 9px));
  top: 1.5rem;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--accent-light);
  border: 2px solid var(--bg);
  z-index: 2;
}

/* Card accent bar */
.meeting-card::after {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 3px;
  background: linear-gradient(to bottom, var(--accent), var(--accent-light) 80%);
  border-radius: 3px 0 0 3px;
  opacity: 0;
  transition: opacity 0.25s ease-out;
}

.meeting-card:hover::after { opacity: 1; }

.card-header {
  padding: 1rem 1.25rem 0;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 0.75rem;
}

.card-date {
  font-size: 0.78rem;
  font-weight: 500;
  color: var(--accent);
  letter-spacing: 0.04em;
  white-space: nowrap;
  padding: 0.25em 0.6em;
  background: oklch(0.85 0.06 150 / 0.18);
  border-radius: var(--radius-sm);
}

.card-title {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(0.95rem, 2.5vw, 1.1rem);
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.35;
  flex: 1;
}

.card-meta {
  padding: 0.6rem 1.25rem 0;
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem 1.25rem;
  font-size: 0.82rem;
  color: var(--text-secondary);
}

.card-meta-item {
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.card-meta-item svg {
  width: 14px;
  height: 14px;
  flex-shrink: 0;
  color: var(--accent-dim);
}

.card-body {
  padding: 0.75rem 1.25rem 0;
}

.card-body pre {
  font-family: 'Noto Sans SC', system-ui, sans-serif;
  font-size: 0.85rem;
  line-height: 1.75;
  color: var(--text-secondary);
  white-space: pre-wrap;
  word-break: break-word;
  background: none;
  padding: 0;
  margin: 0;
  max-height: 12em;
  overflow: hidden;
  position: relative;
}

.card-body pre.expanded {
  max-height: none;
}

.card-body pre:not(.expanded)::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  height: 3em;
  background: linear-gradient(to bottom, transparent, var(--surface));
  pointer-events: none;
}

.card-body .expand-btn {
  display: inline-block;
  font-size: 0.78rem;
  color: var(--accent);
  cursor: pointer;
  border: none;
  background: none;
  font-family: inherit;
  padding: 0.3em 0;
  margin-top: 0.3rem;
  font-weight: 500;
  letter-spacing: 0.03em;
}

.card-body .expand-btn:hover {
  color: var(--accent-dim);
}

.card-actions {
  padding: 0.75rem 1.25rem 1rem;
  display: flex;
  gap: 0.6rem;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-family: inherit;
  font-size: 0.8rem;
  font-weight: 500;
  padding: 0.45em 0.9em;
  border-radius: var(--radius-sm);
  cursor: pointer;
  border: none;
  transition: all 0.18s ease-out;
  letter-spacing: 0.02em;
  white-space: nowrap;
}

.btn-copy {
  background: oklch(0.85 0.06 150 / 0.22);
  color: var(--accent);
}

.btn-copy:hover {
  background: oklch(0.8 0.08 155 / 0.3);
  box-shadow: var(--shadow-sm);
}

.btn-copy:active {
  transform: scale(0.97);
}

.btn-copy.copied {
  background: oklch(0.78 0.1 150 / 0.35);
  color: oklch(0.4 0.12 150);
}

.btn svg { width: 14px; height: 14px; flex-shrink: 0; }

/* ── Footer / Export ── */
.footer {
  position: sticky;
  bottom: 0;
  z-index: 100;
  background: oklch(0.99 0.003 120 / 0.85);
  backdrop-filter: blur(20px) saturate(1.5);
  border-top: 1px solid oklch(0.88 0.015 125 / 0.6);
  padding: 0.85rem clamp(1rem, 5vw, 2rem);
  display: flex;
  justify-content: center;
}

.footer-inner {
  max-width: 800px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}

.footer-info {
  font-size: 0.78rem;
  color: var(--text-muted);
}

.btn-export {
  background: var(--accent);
  color: #fff;
  padding: 0.6em 1.4em;
  font-size: 0.85rem;
  font-weight: 600;
  border-radius: var(--radius);
  letter-spacing: 0.03em;
  box-shadow: 0 2px 8px oklch(0.48 0.14 155 / 0.25);
}

.btn-export:hover {
  background: oklch(0.42 0.14 155);
  box-shadow: 0 4px 16px oklch(0.48 0.14 155 / 0.35);
  transform: translateY(-1px);
}

.btn-export:active {
  transform: translateY(0);
}

/* ── Toast ── */
.toast {
  position: fixed;
  bottom: 5rem;
  left: 50%;
  transform: translateX(-50%) translateY(0.5rem);
  background: var(--text-primary);
  color: var(--surface);
  font-size: 0.82rem;
  padding: 0.55em 1.2em;
  border-radius: 999px;
  font-weight: 500;
  opacity: 0;
  pointer-events: none;
  transition: all 0.25s ease-out;
  z-index: 200;
  box-shadow: var(--shadow-lg);
  letter-spacing: 0.02em;
}

.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ── Print Styles for PDF ── */
@media print {
  @page { margin: 1.5cm 1cm; size: A4; }

  body {
    background: #fff !important;
    background-image: none !important;
    font-size: 11pt;
    color: #1a1a1a;
    line-height: 1.6;
  }

  .header,
  .footer,
  .btn,
  .card-body .expand-btn,
  .toast,
  .hero-eyebrow,
  .card-actions,
  .card-date,
  .card-meta,
  .timeline::before,
  .meeting-card::before,
  .meeting-card::after,
  .month-label::before,
  .month-label::after,
  .header-badge,
  .hero-sub .sep,
  .card-body pre::after {
    display: none !important;
  }

  .hero h1 {
    font-size: 18pt;
    text-align: center;
    margin-bottom: 1rem;
    font-weight: 900;
  }

  .hero-sub {
    text-align: center;
    justify-content: center;
    font-size: 10pt;
  }

  .timeline {
    padding: 0 0.5rem;
  }

  .meeting-card {
    margin-left: 0;
    box-shadow: none;
    border: none;
    border-bottom: 1px solid #ddd;
    border-radius: 0;
    background: #fff;
    page-break-inside: avoid;
    padding: 0.5rem 0;
    margin-bottom: 0.5rem;
  }

  .card-header {
    padding: 0;
  }

  .card-title {
    font-size: 12pt;
    font-weight: 700;
  }

  .card-body {
    padding: 0.3rem 0 0;
  }

  .card-body pre {
    max-height: none;
    font-size: 9.5pt;
    color: #333;
    line-height: 1.55;
    font-family: 'Noto Sans SC', system-ui, sans-serif;
  }

  .card-body pre::after { display: none; }

  .month-label {
    margin: 0.8rem 0 0.4rem;
    font-size: 11pt;
    border-bottom: 2px solid #333;
  }

  .hero { padding: 1rem 0.5rem; }
}

@media print and (color) {
  .card-title { color: #1a472a; }
  .month-label { color: #2d6a4f; }
}

/* ── Mobile ── */
@media (max-width: 600px) {
  .timeline::before {
    left: 0.75rem;
  }

  .meeting-card {
    margin-left: 2rem;
  }

  .month-label {
    margin-left: 2rem;
    font-size: 0.9rem;
  }

  .meeting-card::before {
    left: calc(-1 * (2rem - 1rem + 9px));
    top: 1.2rem;
  }

  .card-header {
    flex-direction: column;
    gap: 0.4rem;
    padding: 0.85rem 1rem 0;
  }

  .card-meta { padding: 0.5rem 1rem 0; }
  .card-body { padding: 0.6rem 1rem 0; }
  .card-actions { padding: 0.6rem 1rem 0.85rem; }

  .btn-copy {
    flex: 1;
    justify-content: center;
  }
}

/* reduce motion */
@media (prefers-reduced-motion: reduce) {
  .meeting-card,
  .btn,
  .toast {
    transition: none;
  }
}
</style>
</head>

<header class="header">

<div class="toast" id="toast"></div>

function getMonthKey(dateStr) {
  const m = dateStr.match(/(\d+)月/);
  return m ? parseInt(m[1]) : 0;
}

function getMonthName(m) {
  const map = {3:'三月',4:'四月',5:'五月',6:'六月'};
  return map[m] || '';
}

function renderMeetings() {
  const timeline = document.getElementById('timeline');
  let currentMonth = 0;
  let html = '';

  MEETINGS.forEach((m, idx) => {
    const mk = getMonthKey(m.date);
    if (mk !== currentMonth) {
      currentMonth = mk;
      html += `<div class="month-label">${getMonthName(mk)}</div>`;
    }

    html += `
    <div class="meeting-card" id="card-${idx}">
      <div class="card-header">
        <span class="card-date">${m.date}</span>
        <span class="card-title">${escapeHTML(m.title)}</span>
      </div>
      <div class="card-meta">
        <span class="card-meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          ${escapeHTML(m.attendees)}
        </span>
        <span class="card-meta-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
          ${escapeHTML(m.location)}
        </span>
      </div>
      <div class="card-body">
        <pre id="body-${idx}">${escapeHTML(m.content)}</pre>
        <button class="expand-btn" id="expand-${idx}" onclick="toggleExpand(${idx})">展开全文 ▾</button>
      </div>
      <div class="card-actions">
        <button class="btn btn-copy" id="copybtn-${idx}" onclick="copyMeeting(${idx})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          一键复制
        </button>
      </div>
    </div>`;
  });

  timeline.innerHTML = html;

  // Auto-collapse long content
  MEETINGS.forEach((m, idx) => {
    const pre = document.getElementById('body-' + idx);
    if (pre && pre.scrollHeight <= pre.clientHeight + 4) {
      const btn = document.getElementById('expand-' + idx);
      if (btn) btn.style.display = 'none';
      pre.classList.add('expanded');
    }
  });
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function toggleExpand(idx) {
  const pre = document.getElementById('body-' + idx);
  const btn = document.getElementById('expand-' + idx);
  if (!pre || !btn) return;
  const isExpanded = pre.classList.contains('expanded');
  if (isExpanded) {
    pre.classList.remove('expanded');
    btn.textContent = '展开全文 ▾';
  } else {
    pre.classList.add('expanded');
    btn.textContent = '收起 ▲';
  }
}

function copyMeeting(idx) {
  const m = MEETINGS[idx];
  const text = `【${m.date}】${m.title}\n地点：${m.location}\n参会人员：${m.attendees}\n\n${m.content}`;

  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copybtn-' + idx);
    btn.classList.add('copied');
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> 已复制`;
    showToast('会议内容已复制到剪贴板');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> 一键复制`;
    }, 1800);
  }).catch(() => {
    showToast('复制失败，请重试');
  });
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.classList.remove('show'), 1800);
}

function exportPDF() {
  showToast('正在准备导出 PDF…');
  setTimeout(() => window.print(), 300);
}

renderMeetings();
</script>
